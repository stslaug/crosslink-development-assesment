Transform: AWS::Serverless-2016-10-31
Resources:
  crosslinkTypeScript:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: crosslinkTypeScript
      InlineCode: |
        export const handler = async (event) => {
          const apiKey = process.env.API_KEY;

          if (!apiKey) {
            return {
              statusCode: 500,
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({ error: "API Key Missing" })
            };
          }

          try {
            const response = await fetch('https://api.currentsapi.services/v1/latest-news', {
              headers: {
                'Authorization': apiKey
              }
            });

            if (!response.ok) {
              return {
                statusCode: response.status,
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ error: `Error! status: ${response.status}` })
              };
            }

            const data = await response.json();

            return {
              statusCode: 200,
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify(data)
            };

          } catch (error) {
            return {
              statusCode: 500,
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({ error: error.message })
            };
          }
        };
      Handler: index.handler
      Runtime: nodejs22.x
      MemorySize: 3008
      Timeout: 30
      Tracing: Active
      Events:
        crossLinkAPIGETts:
          Type: Api
          Properties:
            Path: /ts
            Method: GET
            RestApiId: !Ref crossLinkAPI
  crosslinkTypeScriptLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${crosslinkTypeScript}
  crossLinkAPI:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub
        - ${ResourceName} From Stack ${AWS::StackName}
        - ResourceName: crossLinkAPI
      StageName: Prod
      DefinitionBody:
        openapi: '3.0'
        info: {}
        paths:
          /ts:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${crosslinkTypeScript.Arn}/invocations
              responses: {}
      EndpointConfiguration: REGIONAL
      TracingEnabled: true
      Cors:
        MaxAge: 5