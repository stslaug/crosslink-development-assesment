Transform: AWS::Serverless-2016-10-31
Resources:
  crosslinkTypeScript:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: crosslinkTypeScript
      Environment:
        Variables:
          API_KEY: CHANGE_ME
      InlineCode: |
        exports.handler = async (event) => {
          const apiKey = process.env.API_KEY;
          if (!apiKey) {
            return {
              statusCode: 500,
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({ error: "API Key Missing. Ask service administrator for help!" })
            };
          }
          try {
            const response = await fetch('https://api.currentsapi.services/v1/latest-news', {
              headers: {
                'Authorization': apiKey
              }
            });
            if (!response.ok) {
              return {
                statusCode: response.status,
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ error: `Error! status: ${response.status}` })
              };
            }
            const data = await response.json();
            return {
              statusCode: 200,
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify(data)
            };
          } catch (error) {
            return {
              statusCode: 500,
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({ error: error.message })
            };
          }
        };

      Handler: index.handler
      Runtime: nodejs22.x
      MemorySize: 3008
      Timeout: 30
      Role: !GetAtt SharedLambdaExecutionRole.Arn
      Tracing: Active
      Events:
        crossLinkAPIGETts:
          Type: Api
          Properties:
            Path: /ts
            Method: GET
            RestApiId: !Ref crossLinkAPI
            Auth:
              Authorizer: CognitoAuth
  crosslinkTypeScriptLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${crosslinkTypeScript}
  crossLinkAPI:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub
        - ${ResourceName} From Stack ${AWS::StackName}
        - ResourceName: crossLinkAPI
      StageName: Prod
      EndpointConfiguration: REGIONAL
      TracingEnabled: true
      Cors:
        MaxAge: 5
      Auth:
        Authorizers:
          CognitoAuth:
            UserPoolArn: !GetAtt CrosslinkUserPool.Arn
            Identity:
              Header: Authorization
  CrosslinkUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AliasAttributes:
        - email
      UserPoolName: !Sub ${AWS::StackName}-CrosslinkUserPool
  crosslinkPython:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: crosslinkPython
      InlineCode: |
        import requests
        headers = {
          'Authorization': process.env.API_KEY
        }
        response = requests.get(
          'https://api.currentsapi.services/v1/latest-news',
          headers=headers
        )
        data = response.json()
        return data
      Handler: index.handler
      Runtime: python3.13
      MemorySize: 3008
      Timeout: 30
      Tracing: Active
      Role: !GetAtt SharedLambdaExecutionRole.Arn
      Events:
        crossLinkAPIGETpy:
          Type: Api
          Properties:
            Path: /py
            Method: GET
            RestApiId: !Ref crossLinkAPI
            Auth:
              Authorizer: CognitoAuth
  crosslinkPythonLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${crosslinkPython}

  SharedLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      # Here is where you attach that exact policy you saw in the console
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole